<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explosive Concepts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Space Mono', monospace;
    }

    /* ── Scanlines ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,0.12) 3px, rgba(0,0,0,0.12) 4px
      );
    }

    /* ── Vignette ── */
    .vignette {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 50%, rgba(0,0,0,0.75) 100%);
    }

    /* ── Scattered dot overlay ── */
    .dot-overlay {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.18) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 28px 28px, 14px 14px;
      background-position: 0 0, 7px 7px;
    }

    /* ── Screen flicker ── */
    @keyframes flicker {
      0%,100% { opacity:1 }
      92%      { opacity:1 }
      93%      { opacity:.92 }
      94%      { opacity:1 }
      96%      { opacity:.95 }
      97%      { opacity:1 }
    }
    .flicker { animation: flicker 10s infinite; }

    /* ── Cursor blink ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s step-end infinite; }

    /* ── Subtle heading glitch on hover ── */
    @keyframes glitch-shift {
      0%  { clip-path: inset(0 0 98% 0); transform: translate(-3px, 0); }
      20% { clip-path: inset(30% 0 50% 0); transform: translate(3px, 0); }
      40% { clip-path: inset(60% 0 20% 0); transform: translate(-2px, 0); }
      60% { clip-path: inset(80% 0 5% 0);  transform: translate(2px, 0); }
      80% { clip-path: inset(10% 0 80% 0); transform: translate(-1px, 0); }
      100%{ clip-path: inset(0 0 98% 0);   transform: translate(0); }
    }

    .glitch-wrap { position: relative; display: inline-block; }
    .glitch-wrap::before,
    .glitch-wrap::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      font: inherit; color: inherit;
      pointer-events: none; opacity: 0;
    }
    .glitch-wrap:hover::before {
      color: #0ff; opacity: .6;
      animation: glitch-shift .4s steps(1) infinite;
    }
    .glitch-wrap:hover::after {
      color: #f0f; opacity: .4;
      animation: glitch-shift .4s steps(1) infinite reverse;
    }

    /* ── Retro button ── */
    .btn-retro {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.65);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2.5px;
      padding: 12px 28px;
      text-decoration: none;
      text-transform: uppercase;
      background: transparent;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      position: relative;
      overflow: hidden;
    }
    .btn-retro::before {
      content: '';
      position: absolute; inset: 0;
      background: #fff;
      transform: translateX(-101%);
      transition: transform .18s ease;
      z-index: -1;
    }
    .btn-retro:hover { color: #000; border-color: #fff; }
    .btn-retro:hover::before { transform: translateX(0); }

    /* ── Hero box ── */
    .hero-box {
      position: relative;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.5);
      padding: 44px 52px 48px;
      max-width: 660px;
      width: 100%;
      backdrop-filter: blur(2px);
    }

    /* corner accents */
    .hero-box::before, .hero-box::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
    }
    .hero-box::before {
      top: -1px; right: -1px;
      border-top: 2px solid rgba(255,255,255,0.5);
      border-right: 2px solid rgba(255,255,255,0.5);
    }
    .hero-box::after {
      bottom: -1px; left: -1px;
      border-bottom: 2px solid rgba(255,255,255,0.5);
      border-left: 2px solid rgba(255,255,255,0.5);
    }

    /* ── Small monitor icon ── */
    .monitor-icon {
      width: 16px; height: 12px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 1px;
      position: relative;
      display: inline-block;
    }
    .monitor-icon::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 3px;
      background: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body class="flicker">

  <!-- ── Video background ── -->
  <video autoplay muted loop playsinline
    style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;">
    <source src="522.mp4" type="video/mp4">
  </video>

  <!-- ── Dark overlay ── -->
  <div style="position:fixed;inset:0;background:rgba(0,0,0,0.52);z-index:1;"></div>

  <!-- ── Dot grid ── -->
  <div class="dot-overlay"></div>

  <!-- ── Scanlines + vignette ── -->
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <!-- ── Main layout ── -->
  <div style="position:relative;z-index:10;height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 24px;">

    <div class="hero-box">

      <!-- Top indicator row -->
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="width:28px;height:1px;background:rgba(255,255,255,0.45);"></div>
        <span style="font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:3px;">001</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,0.18);"></div>
        <div style="width:5px;height:5px;border:1px solid rgba(255,255,255,0.35);transform:rotate(45deg);"></div>
      </div>

      <!-- Heading with left border -->
      <div style="border-left:2px solid rgba(255,255,255,0.85);padding-left:22px;">
        <div class="glitch-wrap" data-text="EXPLOSIVE&#10;CONCEPTS">
          <h1 style="font-weight:700;font-size:clamp(40px,7vw,68px);line-height:1.0;color:#fff;letter-spacing:-1px;text-transform:uppercase;white-space:pre-line;">EXPLOSIVE
CONCEPTS</h1>
        </div>
      </div>

      <!-- Dotted separator -->
      <div style="margin:22px 0 20px 24px;border-top:1px dashed rgba(255,255,255,0.22);"></div>

      <!-- Subtext -->
      <p style="font-size:12px;color:rgba(255,255,255,0.55);line-height:1.75;margin-left:24px;margin-bottom:32px;letter-spacing:0.4px;max-width:460px;">
        Bold ideas. Sharp execution. Agentic Development. — Ready to create something explosive?
      </p>

      <!-- CTA buttons -->
      <div style="margin-left:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;">
        <!-- <a href="mailto:hello@explosiveconcepts.com" class="btn-retro">GET IN TOUCH</a> -->
        <a href="mailto:hello@explosiveconcepts.com" class="btn-retro">CONTACT US</a>
      </div>

      <!-- Bottom-right monitor icon -->
      <div style="position:absolute;bottom:18px;right:20px;">
        <div class="monitor-icon"></div>
      </div>

      <!-- Blinking cursor -->
      <div style="position:absolute;bottom:20px;left:52px;">
        <span style="font-size:11px;color:rgba(255,255,255,0.3);" class="blink">_</span>
      </div>

    </div>
  </div>

</body>
</html>
